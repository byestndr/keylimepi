name: spotimmich
description: "A remote control and image frame for Spotify"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  crypto: ^3.0.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0-dev.17
  http: ^1.4.0
  riverpod_annotation: ^3.0.0-dev.17
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.5.4
  custom_lint: ^0.8.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^3.0.0-dev.17
  riverpod_lint: ^3.0.0-dev.17

flutter:

  uses-material-design: true
  assets:
     - assets/imagePlaceholder.png