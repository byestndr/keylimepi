name: spotimmich
description: "A remote control and image frame for Spotify"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  cached_network_image: ^3.4.1
  chopper: ^8.5.1
  collection: ^1.19.1
  crypto: ^3.0.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0-dev.17
  flutter_secure_storage: ^10.0.0
  http: ^1.4.0
  marquee: ^2.3.0
  network_info_plus: ^7.0.0
  qr_flutter: ^4.1.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.3
  shelf: ^1.4.2
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.5.4
  chopper_generator: ^8.5.1
  custom_lint: ^0.8.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.0.0-dev.17

flutter:
  uses-material-design: true
  assets:
     - assets/imagePlaceholder.png
  fonts:
    - family: RobotoFlexVariable
      fonts:
        - asset: assets/RobotoFlex-VariableFont.ttf
    - family: NotoSansJP
      fonts:
        - asset: assets/NotoSansJP-VariableFont_wght.ttf
